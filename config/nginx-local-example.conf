# Example nginx configuration snippets for a local/trusted deployment.
#
# The safest production-style setup is to make this application's web root the
# public/ directory. For quick local public_html testing, v0.1.8+ also includes
# a root-level index.php shim so /invoices/index.php can work without exposing
# /public/index.php directly.
#
# v0.1.10 adds two PHP-FPM layout choices:
#   1. Per-tool pool: /run/php/gnucash-invoice-batch-creator.sock
#   2. Shared GnuCash tools pool: /run/php/gnucash-tools.sock
#
# Even when the same PHP-FPM pool is shared, each tool still needs its own
# nginx location block so nginx can map the URL to the correct filesystem path.

###############################################################################
# Option A: dedicated local vhost or localhost server root
###############################################################################
# server {
#     listen 80;
#     server_name invoices.localhost;
#     root /home/alan/public_html/invoices/public;
#     index index.php;
#
#     location / {
#         try_files $uri $uri/ /index.php?$query_string;
#     }
#
#     location ~ \.php$ {
#         include fastcgi_params;
#         fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
#         fastcgi_param DOCUMENT_ROOT $realpath_root;
#         fastcgi_pass unix:/run/php/gnucash-invoice-batch-creator.sock;
#     }
# }

###############################################################################
# Option B: subdirectory under an existing public_html server, e.g.
# http://localhost/invoices/
###############################################################################
# This assumes the repo is cloned at /home/alan/public_html/invoices.
# It serves the app through the root index.php shim and blocks private folders.

location /invoices/ {
    alias /home/alan/public_html/invoices/;
    index index.php;
    try_files $uri $uri/ /invoices/index.php?$query_string;
}

location ~ ^/invoices/(.+\.php)$ {
    alias /home/alan/public_html/invoices/$1;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /home/alan/public_html/invoices/$1;
    fastcgi_param DOCUMENT_ROOT /home/alan/public_html/invoices;
    fastcgi_pass unix:/run/php/gnucash-invoice-batch-creator.sock;
}

location ~ ^/invoices/(?:app|bin|config|data|var|\.git|\.github)/ {
    deny all;
}

###############################################################################
# Option C: shared GnuCash tools parent directory
###############################################################################
# Suggested layout:
#
#   /home/alan/public_html/gnucashtools/invoices
#   /home/alan/public_html/gnucashtools/bills
#
# Install the shared pool with:
#
#   cd /home/alan/public_html/gnucashtools/invoices
#   sudo bash bin/install-gnucash-tools-fpm-pool.sh alan publicweb 8.5 /home/alan/public_html/gnucashtools
#
# This creates /run/php/gnucash-tools.sock with open_basedir set to the shared
# parent directory. Both GnuCash tools can use the same socket. nginx still
# needs one location block per tool so the URL maps to the right directory.

location /gnucashtools/invoices/ {
    alias /home/alan/public_html/gnucashtools/invoices/;
    index index.php;
    try_files $uri $uri/ /gnucashtools/invoices/index.php?$query_string;
}

location ~ ^/gnucashtools/invoices/(.+\.php)$ {
    alias /home/alan/public_html/gnucashtools/invoices/$1;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /home/alan/public_html/gnucashtools/invoices/$1;
    fastcgi_param DOCUMENT_ROOT /home/alan/public_html/gnucashtools/invoices;
    fastcgi_pass unix:/run/php/gnucash-tools.sock;
}

location ~ ^/gnucashtools/invoices/(?:app|bin|config|data|var|\.git|\.github)/ {
    deny all;
}

# Example sibling for the vendor/bill import tool. Adjust the PHP entrypoint and
# private directories to match that project if they differ.
location /gnucashtools/bills/ {
    alias /home/alan/public_html/gnucashtools/bills/;
    index index.php;
    try_files $uri $uri/ /gnucashtools/bills/index.php?$query_string;
}

location ~ ^/gnucashtools/bills/(.+\.php)$ {
    alias /home/alan/public_html/gnucashtools/bills/$1;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /home/alan/public_html/gnucashtools/bills/$1;
    fastcgi_param DOCUMENT_ROOT /home/alan/public_html/gnucashtools/bills;
    fastcgi_pass unix:/run/php/gnucash-tools.sock;
}

location ~ ^/gnucashtools/bills/(?:app|bin|config|data|var|\.git|\.github)/ {
    deny all;
}

###############################################################################
# PHP-FPM open_basedir choices
###############################################################################
# Strict per-clone pool:
#
#   cd /home/alan/public_html/invoices
#   sudo bash bin/install-local-fpm-pool.sh alan publicweb 8.5 "$(pwd)"
#
# Broader /home/alan/public_html pool for local/trusted development:
#
#   cd /home/alan/public_html/invoices
#   sudo bash bin/install-local-fpm-pool.sh alan publicweb 8.5 "$(pwd)" public_html
#
# Shared GnuCash tools pool:
#
#   cd /home/alan/public_html/gnucashtools/invoices
#   sudo bash bin/install-gnucash-tools-fpm-pool.sh alan publicweb 8.5 /home/alan/public_html/gnucashtools
#
# The broader the open_basedir root, the easier sibling tools are to deploy, but
# the less isolation PHP has between projects. For a trusted local workstation,
# /home/alan/public_html/gnucashtools is a reasonable middle ground.

###############################################################################
# If you still see "No input file specified"
###############################################################################
# That message usually means nginx sent PHP-FPM a SCRIPT_FILENAME that does not
# point to the real file, or PHP-FPM open_basedir excludes the clone path.
# Check both the nginx SCRIPT_FILENAME path and the active pool's open_basedir.

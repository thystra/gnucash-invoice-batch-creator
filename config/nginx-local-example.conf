# Example nginx location for a local/trusted deployment using the dedicated
# PHP-FPM pool installed by bin/install-local-fpm-pool.sh.
# Merge this into your existing server block; do not copy blindly over a live
# nginx config.

root /home/alan/public_html/gnucash-invoice-batch-creator/public;
index index.php;

location /gnucash-invoice-batch-creator/ {
    alias /home/alan/public_html/gnucash-invoice-batch-creator/public/;
    try_files $uri $uri/ /gnucash-invoice-batch-creator/index.php?$query_string;
}

location ~ ^/gnucash-invoice-batch-creator/(.+\.php)$ {
    alias /home/alan/public_html/gnucash-invoice-batch-creator/public/$1;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /home/alan/public_html/gnucash-invoice-batch-creator/public/$1;
    fastcgi_param DOCUMENT_ROOT /home/alan/public_html/gnucash-invoice-batch-creator/public;
    fastcgi_pass unix:/run/php/gnucash-invoice-batch-creator.sock;
}

location ~ ^/gnucash-invoice-batch-creator/(?:app|bin|config|data|var|\.git|\.github)/ {
    deny all;
}

# Example nginx configuration snippets for a local/trusted deployment.
#
# The safest production-style setup is to make this application's web root the
# public/ directory. For quick local public_html testing, v0.1.8 also includes
# a root-level index.php shim so /invoices/index.php can work without exposing
# /public/index.php directly.

